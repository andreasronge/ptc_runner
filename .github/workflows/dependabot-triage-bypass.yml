name: Dependabot Triage Bypass

# The "triage" required status check is produced by the Claude auto-triage
# pipeline (claude-auto-triage.yml), which only runs for Claude-authored PRs.
# Dependabot PRs never get a triage status, so the required check stays
# "expected" forever and blocks the merge — only an admin bypass could clear it.
#
# This workflow mirrors the CI result onto a "triage" status for Dependabot PRs
# so they satisfy the required check on their own. It runs via workflow_run
# (default-branch context), which gives it a writable GITHUB_TOKEN even though
# the underlying PR is from Dependabot — unlike a pull_request-triggered job,
# whose token would be read-only. Statuses posted with this token come from the
# GitHub Actions app (integration_id 15368), matching the required check's
# pinned integration. Claude-authored PRs (non-dependabot/* branches) are
# untouched and keep the full triage gate.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  triage-bypass:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Mirror CI result onto triage status
        env:
          GH_TOKEN: ${{ github.token }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "$CONCLUSION" = "success" ]; then
            STATE="success"
            DESC="Auto-passed: triage not required for Dependabot"
          else
            STATE="failure"
            DESC="CI $CONCLUSION; triage bypass withheld"
          fi

          gh api "repos/${{ github.repository }}/statuses/$HEAD_SHA" \
            -f state="$STATE" \
            -f context="triage" \
            -f description="$DESC"
