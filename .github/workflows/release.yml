name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      llm_runs:
        description: 'demo --runs per suite'
        type: string
        default: '1'
      skip_llm:
        description: 'skip the real-LLM smoke'
        type: boolean
        default: false

permissions:
  contents: read

env:
  HEX_SPONSOR: false

jobs:
  test:
    runs-on: ubuntu-latest
    name: Default tests
    timeout-minutes: 15
    env:
      MIX_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Elixir environment
        uses: ./.github/actions/setup-elixir

      - name: Run default test suite
        id: root_test
        run: mix test

      - name: Write report fragment
        if: always()
        run: |
          mkdir -p tmp/release-report
          {
            echo "## test"
            echo ""
            echo "| Command | Outcome |"
            echo "|---|---|"
            echo "| \`MIX_ENV=test mix test\` | ${{ steps.root_test.outcome }} |"
          } > tmp/release-report/test.md

      - name: Upload report fragment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-fragment-test
          path: tmp/release-report/test.md
          if-no-files-found: warn
          retention-days: 30

  soak:
    runs-on: ubuntu-latest
    name: Memory soak
    timeout-minutes: 20
    env:
      MIX_ENV: test
      PTC_SOAK_ITERATIONS: 3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Elixir environment
        uses: ./.github/actions/setup-elixir

      - name: Run root soak tests
        id: root_soak
        run: mix test --only soak

      - name: Install mcp_server dependencies
        id: mcp_deps
        working-directory: mcp_server
        run: mix deps.get

      - name: Run mcp_server soak tests
        id: mcp_soak
        working-directory: mcp_server
        run: |
          mix test \
            --only soak \
            test/soak/session_churn_soak_test.exs \
            test/soak/many_turns_soak_test.exs \
            test/soak/http_mcp_soak_test.exs

      - name: Write report fragment
        if: always()
        run: |
          mkdir -p tmp/release-report
          {
            echo "## soak"
            echo ""
            echo "| Command | Outcome |"
            echo "|---|---|"
            echo "| \`PTC_SOAK_ITERATIONS=3000 MIX_ENV=test mix test --only soak\` | ${{ steps.root_soak.outcome }} |"
            echo "| \`cd mcp_server && mix deps.get\` | ${{ steps.mcp_deps.outcome }} |"
            echo "| \`cd mcp_server && PTC_SOAK_ITERATIONS=3000 mix test --only soak test/soak/session_churn_soak_test.exs test/soak/many_turns_soak_test.exs test/soak/http_mcp_soak_test.exs\` | ${{ steps.mcp_soak.outcome }} |"
          } > tmp/release-report/soak.md

      - name: Upload report fragment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-fragment-soak
          path: tmp/release-report/soak.md
          if-no-files-found: warn
          retention-days: 30

  integrity:
    runs-on: ubuntu-latest
    name: Release integrity
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Elixir environment
        uses: ./.github/actions/setup-elixir

      - name: Verify version and changelog
        id: version_changelog
        run: |
          MIX_VERSION=$(mix run -e 'Mix.Project.config()[:version] |> IO.puts()' | tail -n 1 | tr -d '[:space:]')
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [ "${GITHUB_REF_NAME:-}" != "" ]; then
            TAG_VERSION=${GITHUB_REF_NAME#v}
          else
            TAG_VERSION="$MIX_VERSION"
          fi

          echo "$MIX_VERSION" > tmp-release-version
          echo "Release version: $MIX_VERSION"
          echo "Tag version: $TAG_VERSION"

          if [ "$TAG_VERSION" != "$MIX_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match mix.exs version $MIX_VERSION"
            exit 1
          fi

          if ! grep -Eq "^## \\[$MIX_VERSION\\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing a ## [$MIX_VERSION] heading"
            exit 1
          fi

      - name: Verify Hex package contents
        id: package
        run: |
          rm -rf tmp/hex-unpack
          mkdir -p tmp/hex-unpack
          mix hex.build --unpack --output tmp/hex-unpack

          PACKAGE_DIR=tmp/hex-unpack
          if [ ! -d "$PACKAGE_DIR/lib" ]; then
            echo "::error::mix hex.build --unpack did not create the expected unpacked package tree"
            exit 1
          fi

          echo "$PACKAGE_DIR" > tmp/package-unpack-path
          echo "Unpacked package: $PACKAGE_DIR"

          required_paths=(
            "priv/prompts"
            "priv/spec"
            "priv/ptc_schema.json"
            "docs"
            "docs/function-reference.md"
            "docs/java-interop.md"
            "docs/conformance/index.md"
            "README.md"
            "CHANGELOG.md"
          )

          missing=0
          for path in "${required_paths[@]}"; do
            if [ ! -e "$PACKAGE_DIR/$path" ]; then
              echo "::error::Package is missing $path"
              missing=1
            fi
          done

          exit "$missing"

      - name: Check schema drift
        id: schema
        run: |
          mix schema.gen
          git diff --exit-code -- priv/ptc_schema.json

      - name: Validate spec checksums
        id: spec
        run: mix ptc.validate_spec

      - name: Write report fragment
        if: always()
        run: |
          mkdir -p tmp/release-report
          VERSION=$(cat tmp-release-version 2>/dev/null || echo unknown)
          PACKAGE_DIR=$(cat tmp/package-unpack-path 2>/dev/null || echo unknown)
          {
            echo "## integrity"
            echo ""
            echo "- Release version: \`$VERSION\`"
            echo "- Unpacked package: \`$PACKAGE_DIR\`"
            echo ""
            echo "| Check | Outcome |"
            echo "|---|---|"
            echo "| Version/tag and changelog heading | ${{ steps.version_changelog.outcome }} |"
            echo "| Hex package bundled files | ${{ steps.package.outcome }} |"
            echo "| Schema drift | ${{ steps.schema.outcome }} |"
            echo "| Spec checksums | ${{ steps.spec.outcome }} |"
          } > tmp/release-report/integrity.md

      - name: Upload report fragment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-fragment-integrity
          path: tmp/release-report/integrity.md
          if-no-files-found: warn
          retention-days: 30

      - name: Upload unpacked package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-hex-unpack
          path: tmp/hex-unpack/
          if-no-files-found: warn
          retention-days: 30

  docs:
    runs-on: ubuntu-latest
    name: Documentation checks
    timeout-minutes: 10
    env:
      MIX_ENV: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Elixir environment
        uses: ./.github/actions/setup-elixir

      - name: Build docs with warnings as errors
        id: exdoc
        run: mix docs --warnings-as-errors

      - name: Check generated-doc drift
        id: generated
        run: |
          mix ptc.gen_docs
          mix ptc.conformance_report --write-inventory
          git diff --exit-code -- docs/ conformance_inventory.json
          test -z "$(git status --porcelain -- docs/ conformance_inventory.json)"

      - name: Check relative links
        id: lychee_offline
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress README.md 'docs/**/*.md' 'mcp_server/*.md'
          fail: true

      - name: Check external links
        id: lychee_online
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress README.md 'docs/**/*.md' 'mcp_server/*.md'
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write report fragment
        if: always()
        run: |
          mkdir -p tmp/release-report
          {
            echo "## docs"
            echo ""
            echo "| Check | Outcome |"
            echo "|---|---|"
            echo "| \`MIX_ENV=dev mix docs --warnings-as-errors\` | ${{ steps.exdoc.outcome }} |"
            echo "| Generated-doc drift | ${{ steps.generated.outcome }} |"
            echo "| Lychee offline relative-link gate | ${{ steps.lychee_offline.outcome }} |"
            echo "| Lychee online external-link info | ${{ steps.lychee_online.outcome }} |"
          } > tmp/release-report/docs.md

      - name: Upload report fragment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-fragment-docs
          path: tmp/release-report/docs.md
          if-no-files-found: warn
          retention-days: 30

  perf:
    runs-on: ubuntu-latest
    name: Performance gate
    timeout-minutes: 10
    env:
      MIX_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Elixir environment
        uses: ./.github/actions/setup-elixir

      - name: Check eval performance baseline
        id: bench
        run: mix bench.check

      - name: Write report fragment
        if: always()
        run: |
          mkdir -p tmp/release-report
          {
            echo "## perf"
            echo ""
            echo "| Command | Outcome |"
            echo "|---|---|"
            echo "| \`MIX_ENV=test mix bench.check\` | ${{ steps.bench.outcome }} |"
          } > tmp/release-report/perf.md

      - name: Upload report fragment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-fragment-perf
          path: tmp/release-report/perf.md
          if-no-files-found: warn
          retention-days: 30

  llm-smoke:
    runs-on: ubuntu-latest
    name: Real-LLM smoke
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_llm != true }}
    continue-on-error: true
    timeout-minutes: 25
    env:
      MIX_ENV: test
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      LLM_DEFAULT_PROVIDER: openrouter
      PTC_TEST_MODEL: gemini-flash-lite
      LLM_RUNS: ${{ github.event.inputs.llm_runs || '1' }}
      RELEASE_SMOKE_MODEL: openrouter:google/gemini-3.1-flash-lite

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Elixir environment
        uses: ./.github/actions/setup-elixir

      - name: Install demo dependencies
        working-directory: demo
        run: mix deps.get

      - name: Run demo benchmark smoke
        id: demo
        working-directory: demo
        run: |
          mkdir -p reports/tmp
          mix lisp --test --runs="${LLM_RUNS}" --model="${RELEASE_SMOKE_MODEL}" --report=tmp/lisp.md || true

      - name: Run root e2e smoke
        id: e2e
        run: |
          mkdir -p tmp/llm-smoke
          set +e
          mix test --include e2e 2>&1 | tee tmp/llm-smoke/e2e.log
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Summarize LLM smoke
        if: always()
        run: |
          mkdir -p tmp/release-report tmp/llm-smoke
          {
            echo "## llm-smoke"
            echo ""
            echo "- Model: \`${RELEASE_SMOKE_MODEL}\`"
            echo "- Runs per demo suite: \`${LLM_RUNS}\`"
            echo "- Gating: non-gating stats only"
            echo ""
            echo "| Surface | Passed | Total | Pass rate | Total tokens | Cost |"
            echo "|---|---:|---:|---:|---:|---:|"
            found_demo_report=0
            for report in demo/reports/tmp/*.json; do
              [ -f "$report" ] || continue
              found_demo_report=1
              dsl=$(jq -r '.dsl // "unknown"' "$report")
              passed=$(jq -r '.metrics.passed // 0' "$report")
              total=$(jq -r '.metrics.total // 0' "$report")
              rate=$(jq -r '.metrics.pass_rate // 0' "$report")
              tokens=$(jq -r '.stats.total_tokens // 0' "$report")
              cost=$(jq -r '.stats.total_cost // 0' "$report")
              echo "| demo $dsl | $passed | $total | ${rate}% | $tokens | $cost |"
            done
            if [ "$found_demo_report" = "0" ]; then
              echo "| demo reports | see logs |  |  |  |  |"
            fi
            if [ -f tmp/llm-smoke/e2e.log ]; then
              summary=$(grep -E '[0-9]+ tests?, [0-9]+ failures?' tmp/llm-smoke/e2e.log | tail -n 1 || true)
              echo "| root e2e | ${summary:-see e2e.log} |  |  |  |  |"
            fi
          } | tee tmp/release-report/llm-smoke.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload LLM reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-llm-smoke-reports
          path: |
            demo/reports/tmp/
            tmp/llm-smoke/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload report fragment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-fragment-llm-smoke
          path: tmp/release-report/llm-smoke.md
          if-no-files-found: warn
          retention-days: 30

  stats:
    runs-on: ubuntu-latest
    name: Code & test stats
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history + tags so release-stats.sh can diff against the
          # previous release tag for the growth section.
          fetch-depth: 0

      - name: Compute release stats
        id: stats
        run: |
          mkdir -p tmp/release-report tmp/metrics
          scripts/release-stats.sh tmp/release-report/stats.md tmp/metrics/stats.json
          {
            echo "<!-- stats fragment also added to the release report -->"
            cat tmp/release-report/stats.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report fragment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-fragment-stats
          path: tmp/release-report/stats.md
          if-no-files-found: warn
          retention-days: 30

      - name: Upload metrics JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-metrics-stats
          path: tmp/metrics/stats.json
          if-no-files-found: warn
          retention-days: 30

  coverage:
    runs-on: ubuntu-latest
    name: Test coverage
    timeout-minutes: 25
    continue-on-error: true
    env:
      MIX_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Elixir environment
        uses: ./.github/actions/setup-elixir

      - name: Run tests with coverage
        id: cover
        run: |
          mkdir -p tmp/release-report tmp/metrics
          # Non-gating: capture each project's cover summary even if some tests
          # fail. ptc_runner and the ptc_runner_mcp server are separate Mix
          # projects, each measured in isolation (Mix only instruments the
          # current project's own modules), so they are reported as separate
          # rows in one combined fragment.
          set +e
          mix test --cover 2>&1 | tee tmp/cover.txt
          ( cd mcp_server && mix deps.get && mix test --cover ) 2>&1 | tee tmp/cover-mcp.txt
          set -e
          scripts/coverage-stats.sh tmp/release-report/coverage.md tmp/metrics/coverage.json \
            "ptc_runner (library)" tmp/cover.txt \
            "ptc_runner_mcp (server)" tmp/cover-mcp.txt
          cat tmp/release-report/coverage.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report fragment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-fragment-coverage
          path: tmp/release-report/coverage.md
          if-no-files-found: warn
          retention-days: 30

      - name: Upload metrics JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-metrics-coverage
          path: tmp/metrics/coverage.json
          if-no-files-found: warn
          retention-days: 30

  release-report:
    runs-on: ubuntu-latest
    name: Release report
    if: always()
    needs: [test, soak, integrity, docs, perf, llm-smoke, stats, coverage]
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download report fragments
        uses: actions/download-artifact@v4
        with:
          pattern: release-fragment-*
          path: tmp/release-report/fragments
          merge-multiple: true

      - name: Build release report
        run: |
          mkdir -p tmp
          VERSION=$(grep 'version:' mix.exs | head -n 1 | sed 's/.*"\(.*\)".*/\1/' || echo unknown)
          GENERATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          if [ "${{ needs.test.result }}" = "success" ] &&
             [ "${{ needs.soak.result }}" = "success" ] &&
             [ "${{ needs.integrity.result }}" = "success" ] &&
             [ "${{ needs.docs.result }}" = "success" ] &&
             [ "${{ needs.perf.result }}" = "success" ]; then
            VERDICT="READY TO PUBLISH"
            FAILED="none"
          else
            VERDICT="BLOCKED"
            FAILED=""
            for job in test soak integrity docs perf; do
              case "$job" in
                test) result="${{ needs.test.result }}" ;;
                soak) result="${{ needs.soak.result }}" ;;
                integrity) result="${{ needs.integrity.result }}" ;;
                docs) result="${{ needs.docs.result }}" ;;
                perf) result="${{ needs.perf.result }}" ;;
              esac
              if [ "$result" != "success" ]; then
                FAILED="${FAILED}${FAILED:+, }$job ($result)"
              fi
            done
          fi

          {
            echo "# Release Checks Report"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Repo | \`${GITHUB_REPOSITORY}\` |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Ref | \`${GITHUB_REF}\` |"
            echo "| Version | \`${VERSION}\` |"
            echo "| Actor | \`${GITHUB_ACTOR}\` |"
            echo "| Generated | \`${GENERATED_AT}\` |"
            echo "| Workflow run | ${RUN_URL} |"
            echo ""
            echo "## Gate Verdict"
            echo ""
            echo "**${VERDICT}**"
            echo ""
            echo "Failed gating jobs: ${FAILED}"
            echo ""
            echo "## Job Results"
            echo ""
            echo "| Job | Result | Gates publish? |"
            echo "|---|---|---|"
            echo "| test | ${{ needs.test.result }} | yes |"
            echo "| soak | ${{ needs.soak.result }} | yes |"
            echo "| integrity | ${{ needs.integrity.result }} | yes |"
            echo "| docs | ${{ needs.docs.result }} | yes |"
            echo "| perf | ${{ needs.perf.result }} | yes |"
            echo "| llm-smoke | ${{ needs['llm-smoke'].result }} | no |"
            echo "| stats | ${{ needs.stats.result }} | no |"
            echo "| coverage | ${{ needs.coverage.result }} | no |"
            echo ""
            echo "## Artifacts"
            echo ""
            echo "- \`release-fragment-*\`"
            echo "- \`release-metrics-*\` (machine-readable stats/coverage JSON)"
            echo "- \`release-hex-unpack\`"
            echo "- \`release-llm-smoke-reports\` when the LLM smoke job ran"
            echo "- \`release-checks-report\`"
            echo "- On a tag push: a GitHub Release with these notes + \`release-metrics.json\` attached"
            echo ""
          } > tmp/release-checks.md

          for fragment in tmp/release-report/fragments/*.md; do
            [ -f "$fragment" ] || continue
            echo "" >> tmp/release-checks.md
            cat "$fragment" >> tmp/release-checks.md
          done

          cat tmp/release-checks.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release report
        uses: actions/upload-artifact@v4
        with:
          name: release-checks-report
          path: tmp/release-checks.md
          if-no-files-found: error
          retention-days: 90

  publish:
    runs-on: ubuntu-latest
    name: Publish to Hex.pm
    needs: [test, soak, integrity, docs, perf]
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Elixir environment
        uses: ./.github/actions/setup-elixir

      - name: Build package
        run: mix hex.build

      - name: Publish to Hex.pm
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      - name: Publish docs to HexDocs
        run: mix hex.publish docs --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

  github-release:
    runs-on: ubuntu-latest
    name: Publish GitHub Release
    # ONLY on a real tag push — never on workflow_dispatch — and only when every
    # gate passed (same publish conditions as Hex). `always()` lets the
    # non-gating stats/coverage/report jobs fail without skipping this job; the
    # explicit gate checks below still hold the line.
    needs: [test, soak, integrity, docs, perf, release-report, stats, coverage]
    if: >-
      always() &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.test.result == 'success' &&
      needs.soak.result == 'success' &&
      needs.integrity.result == 'success' &&
      needs.docs.result == 'success' &&
      needs.perf.result == 'success'
    permissions:
      contents: write   # create the GitHub Release for this tag

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: release-checks-report
          path: tmp/dl/report

      - name: Download metric JSONs
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: release-metrics-*
          path: tmp/dl/metrics
          merge-multiple: true

      - name: Assemble release-metrics.json
        run: |
          mkdir -p tmp/out
          VERSION=$(grep 'version:' mix.exs | head -n 1 | sed 's/.*"\(.*\)".*/\1/')
          GENERATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          read_json() { [ -s "$1" ] && cat "$1" || echo null; }
          STATS=$(read_json tmp/dl/metrics/stats.json)
          COVERAGE=$(read_json tmp/dl/metrics/coverage.json)
          jq -n \
            --arg version "$VERSION" --arg tag "$GITHUB_REF_NAME" \
            --arg commit "$GITHUB_SHA" --arg generated "$GENERATED" \
            --argjson stats "$STATS" --argjson coverage "$COVERAGE" \
            '{version:$version, tag:$tag, commit:$commit, generated:$generated, stats:$stats, coverage:$coverage}' \
            > tmp/out/release-metrics.json
          echo "::group::release-metrics.json"; cat tmp/out/release-metrics.json; echo "::endgroup::"

      - name: Compose release notes
        run: |
          mkdir -p tmp/out
          VERSION=$(grep 'version:' mix.exs | head -n 1 | sed 's/.*"\(.*\)".*/\1/')
          # CHANGELOG section for this version (its heading up to the next "## [").
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { f=1; print; next }
            f && /^## \[/ { f=0 }
            f { print }
          ' CHANGELOG.md > tmp/out/changelog.md
          {
            if [ -s tmp/out/changelog.md ]; then cat tmp/out/changelog.md; else echo "Release ${GITHUB_REF_NAME}."; fi
            echo
            echo "---"
            echo
            if [ -s tmp/dl/report/release-checks.md ]; then cat tmp/dl/report/release-checks.md; fi
          } > tmp/out/notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME exists — updating notes and asset."
            gh release edit "$GITHUB_REF_NAME" --notes-file tmp/out/notes.md
            gh release upload "$GITHUB_REF_NAME" tmp/out/release-metrics.json --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file tmp/out/notes.md \
              tmp/out/release-metrics.json
          fi
